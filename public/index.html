<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoShare</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f5a623;
  --gold-dark: #d4891a;
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --text: #f0f0f0;
  --muted: #888;
  --danger: #e74c3c;
  --success: #2ecc71;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* (All your original styles are kept exactly the same - no changes here) */
#authScreen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(ellipse at 30% 20%, #1a1000 0%, var(--bg) 60%); }
.auth-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 30px 80px rgba(0,0,0,0.6); }
/* ... all other original CSS remains unchanged ... */
</style>
</head>
<body>

<!-- AUTH SCREEN (unchanged) -->
<div id="authScreen"> ... (your original auth screen HTML) ... </div>

<!-- APP SHELL (unchanged except notes sidebar) -->
<div id="app">
  <!-- topbar, main, photo section unchanged -->

  <!-- NOTES SECTION -->
  <div id="notesSection" class="section">
    <div class="notes-layout">
      <div class="notes-sidebar">
        <h3 style="font-family:'Syne',sans-serif;">Notes</h3>
        <!-- UPDATED BUTTONS -->
        <button class="new-note-btn" onclick="newNote()">📝 New Note</button>
        <button class="new-note-btn" style="background:#9b59b6;margin-top:6px;" onclick="newPromptNote()">
          ✨ New Prompt Note
        </button>
        <div class="note-list" id="noteList"></div>
      </div>
      <div class="note-editor" id="noteEditor">
        <div class="note-placeholder">Select a note or create a new one</div>
      </div>
    </div>
  </div>

  <!-- PREVIEW MODAL (unchanged) -->
  <div id="previewModal"> ... (your original preview modal) ... </div>

  <!-- NEW PROMPT MODAL -->
  <div id="promptModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:2000;align-items:center;justify-content:center;">
    <div style="background:#1a1a1a;border:1px solid #f5a623;border-radius:16px;padding:28px;width:100%;max-width:380px;">
      <h3 style="text-align:center;margin-bottom:20px;color:#f5a623;">What kind of prompt?</h3>
      <div style="display:grid;gap:8px;" id="promptOptions"></div>
      <div id="customNameGroup" style="display:none;margin-top:16px;">
        <label style="font-size:0.8rem;color:#888;">Custom name</label>
        <input id="customPromptName" style="width:100%;padding:10px;background:#111;border:1px solid #444;border-radius:8px;color:white;" placeholder="e.g. Instagram Prompt">
      </div>
      <div style="margin-top:24px;display:flex;gap:12px;">
        <button onclick="closePromptModal()" style="flex:1;padding:12px;background:#333;border:none;border-radius:8px;color:white;cursor:pointer;">Cancel</button>
        <button onclick="createPromptNote()" style="flex:1;padding:12px;background:#f5a623;color:black;font-weight:700;border:none;border-radius:8px;cursor:pointer;">Create Prompt Note</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────
let token = localStorage.getItem('ps_token') || '';
let username = localStorage.getItem('ps_user') || '';
let photos = [];
let notes = [];
let currentView = 'grid';
let currentPhoto = null;
let currentNote = null;
let searchTerm = '';

// ── Toast notifications ──────────────────────────────────────
function showToast(msg, type = 'success') {
  const toast = document.createElement('div');
  toast.style.cssText = `position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:10px;color:#000;font-weight:600;z-index:9999;${type==='error'?'background:#e74c3c':'background:#2ecc71'}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2800);
}

// ── Smart grouping & search (kept from previous improvements) ──
function fmtGroup(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diffDays = Math.floor((now - d) / (1000*60*60*24));
  if (diffDays === 0) return 'Today';
  if (diffDays === 1) return 'Yesterday';
  if (diffDays <= 7) return 'This Week';
  if (d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) return 'This Month';
  return d.toLocaleDateString([], { month: 'long', year: 'numeric' });
}

function filterPhotos() {
  if (!searchTerm) return photos;
  const term = searchTerm.toLowerCase();
  return photos.filter(p => 
    p.originalName.toLowerCase().includes(term) ||
    fmtGroup(p.timestamp).toLowerCase().includes(term)
  );
}

// ── Prompt Note feature ──────────────────────────────────────
const promptTypes = ["YouTube Prompt", "Grok Prompt", "Gemini Prompt", "Claude Prompt", "Midjourney Prompt"];

function newPromptNote() {
  const modal = document.getElementById('promptModal');
  const container = document.getElementById('promptOptions');
  container.innerHTML = '';
  promptTypes.forEach(type => {
    const div = document.createElement('div');
    div.style.cssText = 'padding:12px 16px;background:#242424;border-radius:8px;cursor:pointer;transition:0.2s;';
    div.textContent = type;
    div.onclick = () => selectPromptType(type, div);
    container.appendChild(div);
  });
  const other = document.createElement('div');
  other.style.cssText = 'padding:12px 16px;background:#242424;border-radius:8px;cursor:pointer;';
  other.textContent = 'Others (custom name)';
  other.onclick = () => {
    document.getElementById('customNameGroup').style.display = 'block';
    selectPromptType('Other', other);
  };
  container.appendChild(other);
  modal.style.display = 'flex';
}

let selectedType = null;
function selectPromptType(type, el) {
  document.querySelectorAll('#promptOptions > div').forEach(d => d.style.background = '#242424');
  el.style.background = '#f5a623';
  selectedType = type;
}

function createPromptNote() {
  let finalType = selectedType;
  if (finalType === 'Other') {
    const custom = document.getElementById('customPromptName').value.trim();
    if (!custom) return alert('Please enter a custom name');
    finalType = custom;
  }
  if (!finalType) return alert('Please choose a prompt type');
  closePromptModal();

  const title = `${finalType} • ${new Date().toLocaleDateString('en-US', {month:'short', day:'numeric'})}`;
  fetch('/api/notes', {
    method: 'POST',
    headers: {'Content-Type':'application/json','x-auth-token':token},
    body: JSON.stringify({ title, content: '', promptType: finalType })
  })
  .then(r => r.json())
  .then(note => {
    loadNotes();
    openNote(note);
    showToast('✅ Prompt Note created!');
  });
}

function closePromptModal() {
  document.getElementById('promptModal').style.display = 'none';
  document.getElementById('customNameGroup').style.display = 'none';
  selectedType = null;
}

// ── Notes rendering with prompt badge ────────────────────────
function renderNoteList() {
  const list = document.getElementById('noteList');
  list.innerHTML = '';
  if (!notes.length) {
    list.innerHTML = '<div style="color:var(--muted);padding:12px">No notes yet</div>';
    return;
  }
  notes.forEach(n => {
    const d = document.createElement('div');
    d.className = `note-item${currentNote && currentNote.id===n.id ? ' active' : ''}`;
    const isPrompt = n.promptType;
    d.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px">
        ${isPrompt ? '<span style="background:#9b59b6;color:white;font-size:10px;padding:2px 6px;border-radius:4px;">PROMPT</span>' : ''}
        <div class="note-item-title">${n.title}</div>
      </div>
      <div class="note-item-preview">${n.content.slice(0,55)}${n.content.length>55?'...':''}</div>
    `;
    d.onclick = () => openNote(n);
    list.appendChild(d);
  });
}

function openNote(n) {
  currentNote = n;
  renderNoteList();
  const isPrompt = n.promptType;
  const ed = document.getElementById('noteEditor');
  ed.innerHTML = `
    ${isPrompt ? `<div style="background:#9b59b630;color:#f5a623;padding:8px 12px;border-radius:8px;margin-bottom:12px;font-size:0.85rem;">💡 <strong>${n.promptType}</strong> Prompt</div>` : ''}
    <input class="note-title-input" id="noteTitle" value="${n.title||''}" placeholder="Note title...">
    <textarea class="note-content-area" id="noteContent" placeholder="Paste your prompt here...">${n.content||''}</textarea>
    <div class="note-actions">
      <button class="note-copy-btn" onclick="copyNote()">${isPrompt ? '📋 Copy Prompt' : '📋 Copy'}</button>
      <button class="note-del-btn" onclick="deleteNote('${n.id}')">🗑 Delete</button>
      <button class="note-save-btn" onclick="saveNote('${n.id}')">💾 Save</button>
    </div>`;
}

// ── Copy function ────────────────────────────────────────────
function copyNote() {
  const content = document.getElementById('noteContent')?.value;
  if (!content) return showToast('Nothing to copy', 'error');
  navigator.clipboard.writeText(content).then(() => showToast('✅ Copied to clipboard!'));
}

// (All your original functions for photos, upload, gallery, preview, loadNotes, newNote, saveNote, deleteNote, etc. are kept exactly the same below)
// ── (rest of your original script continues here - loadPhotos, renderGallery, uploadFiles, etc.) ──

// ── Init ─────────────────────────────────────────────────────
if (token) {
  fetch('/api/me',{headers:{'x-auth-token':token}})
    .then(r=>r.ok?r.json():null)
    .then(d=>{ if(d){username=d.username;showApp();}else{token='';localStorage.removeItem('ps_token');} });
}
</script>
</body>
</html>
